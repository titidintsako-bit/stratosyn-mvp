services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stratosyn
      POSTGRES_USER: stratosyn
      POSTGRES_PASSWORD: ${STRATOSYN_POSTGRES_PASSWORD:?Set STRATOSYN_POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - stratosyn_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stratosyn -d stratosyn"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    environment:
      STRATOSYN_DATABASE_URL: postgresql+psycopg://stratosyn:${STRATOSYN_POSTGRES_PASSWORD:?Set STRATOSYN_POSTGRES_PASSWORD}@postgres:5432/stratosyn
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  stratosyn_postgres:
